# slurm.conf file generated by configurator.html.
# Put this file on all nodes of your cluster.
# See the slurm.conf man page for more information.
#
# NOTE: This is the Slurm 25.11.x configuration
#
ClusterName=linux # klusterraren izena
SlurmctldHost=slurmctld #slurmctld-ren izena
#SlurmctldHost=
#
#DisableRootJobs=NO
#EnforcePartLimits=NO
#Epilog=
#EpilogSlurmctld=
#FirstJobId=1
#MaxJobId=67043328
GresTypes=gpu # sistemak gpu erabiltzeko ahalbidetu
#GroupUpdateForce=0 
#GroupUpdateTime=600
#JobFileAppend=0
#JobRequeue=1
#JobSubmitPlugins=lua
#KillOnBadExit=0
#LaunchType=launch/slurm
#Licenses=foo*4,bar
#MailProg=/bin/mail
#MaxJobCount=10000
#MaxStepCount=40000
#MaxTasksPerNode=512
#MpiDefault=
#MpiParams=ports=#-#
#PluginDir=
#PlugStackConfig=
#PrivateData=jobs
ProctrackType=proctrack/linuxproc #prozesuen jarraipena egiteko metodoa.
#Prolog=
#PrologFlags=
#PrologSlurmctld=
#PropagatePrioProcess=0
#PropagateResourceLimits=
#PropagateResourceLimitsExcept=
#RebootProgram=
ReturnToService=1 # Nodo batek errorea eman eta berriro martxan jartzen bada, berriro eskuragarri jartzeko.
#PID fitxategiak eta portuak zehazteko
SlurmctldPidFile=/var/run/slurm/slurmctld.pid 
SlurmctldPort=6817
SlurmdPidFile=/var/run/slurm/slurmd.pid
SlurmdPort=6818
SlurmdSpoolDir=/var/spool/slurm
SlurmUser=slurm
#SlurmdUser=root
#SrunEpilog=
#SrunProlog=
StateSaveLocation=/var/lib/slurm # job informazioa eta momentuko fitxategiak gordetzeko.
#SwitchType=
#TaskEpilog=
TaskPlugin=task/affinity #CPU-k zer core-ekin lotuta exekutatu behar diren kontrolatzeko plugin-a
#TaskProlog=
#TopologyPlugin=topology/tree
#TmpFS=/tmp
#TrackWCKey=no
#TreeWidth=
#UnkillableStepProgram=
#UsePAM=0
#
#
# TIMERS
#BatchStartTimeout=10
#CompleteWait=0
#EpilogMsgTime=2000
#GetEnvTimeout=2
#HealthCheckInterval=0
#HealthCheckProgram=
InactiveLimit=0 # nodo inaktiboek ez dute epea edukiko desaktibatzeko.
KillWait=30 # job bat kill eginda dagoenean, 30 segundotan prozesuak itxaroten ditu.
#MessageTimeout=10
#ResvOverRun=0
MinJobAge=300 # job batek gutxienez 300 segundotan egon behar du aktibo izan aurretik
#OverTimeLimit=0
SlurmctldTimeout=120 # slurmctld-k nodo batekin komunikazioa galdu badu, 120 segundotan timeout.
SlurmdTimeout=300 # slurmd batek ez badu komunikatzen, 300 segundotan timeout.
#UnkillableStepTimeout=60
#VSizeFactor=0
Waittime=0 # jobek ez dute itxaroteko denborarik edukiko, berehala exekutatzen dira
#
#
# SCHEDULING
#DefMemPerCPU=0
#MaxMemPerCPU=0
#SchedulerTimeSlice=30
SchedulerType=sched/backfill # backfill scheduler erabiltzeko
SelectType=select/cons_tres # kontsumo tresnak (CPU, memoria, GPU, etab.) kontuan hartuz nodoak hautatzen ditu.
#
#
# JOB PRIORITY
PriorityFlags=FAIR_TREE #faishare
PriorityType=priority/multifactor # hainbat faktorek eragina dute prioritizazioan.
#PriorityDecayHalfLife=
#PriorityCalcPeriod=
#PriorityFavorSmall=
#PriorityMaxAge=
#PriorityUsageResetPeriod=
# Faktore bakoitzaren pisua
PriorityWeightAge=500
PriorityWeightFairshare=1000
PriorityWeightJobSize=2000
PriorityWeightPartition=1000
#PriorityWeightQOS=
#
#
# LOGGING AND ACCOUNTING
#AccountingStorageEnforce=0
AccountingStorageHost=slurmdbd
#AccountingStoragePass=
#AccountingStoragePort=
AccountingStorageType=accounting_storage/slurmdbd #Accounting eta job-completion informazioa gordetzeko SlurmDBD erabili
#AccountingStorageUser=
#AccountingStoreFlags=
#JobCompHost=
JobCompLoc=/var/log/slurm/jobcomp.log #job completion fitxategi testu moduan gordetzen du.
#JobCompParams=
#JobCompPass=
#JobCompPort=
JobCompType=jobcomp/filetxt
#JobCompUser=
#JobContainerType=
JobAcctGatherFrequency=30 # 30 segunduro job-ak biltzen ditu.
#JobAcctGatherType=
#Debug fitxategiak
SlurmctldDebug=info
SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdDebug=info
SlurmdLogFile=/var/log/slurm/slurmd.log
#SlurmSchedLogFile=
#SlurmSchedLogLevel=
#DebugFlags=
#
# AUTHENTICATION
AuthType=auth/munge # munge autentikazioa erabiltzen da segurtasunerako.
#
# POWER SAVE SUPPORT FOR IDLE NODES (optional)
#SuspendProgram=
#ResumeProgram=
#SuspendTimeout=
#ResumeTimeout=
#ResumeRate=
#SuspendExcNodes=
#SuspendExcParts=
#SuspendRate=
#SuspendTime=
#
#
# COMPUTE NODES
NodeName=c1 CPUs=2 RealMemory=1000 State=UNKNOWN
NodeName=c2 CPUs=2 RealMemory=1000 State=UNKNOWN
NodeName=c3 CPUs=4 RealMemory=7500 Gres=gpu:1 State=UNKNOWN
NodeName=c4 CPUs=2 RealMemory=7500 State=UNKNOWN


# Partitions
PartitionName=normal Nodes=c1,c2 Default=YES MaxTime=INFINITE State=UP # Default partizioa, beste ezer ez bada zehazten.
PartitionName=partizioBerria Nodes=c3,c4 Default=NO MaxTime=INFINITE State=UP
PartitionName=gpu Nodes=c3 Default=NO MaxTime=INFINITE State=UP OverSubscribe=NO # ez du CPU gehigarririk onartzen.
PartitionName=memoria_alta Nodes=c4 Default=NO MaxTime=INFINITE State=UP OverSubscribe=NO # ez du CPU gehigarririk onartzen.